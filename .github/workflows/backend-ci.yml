name: Backend CI

on:
  pull_request:
    paths:
      - "read-spark-backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "read-spark-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: read-spark-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: read-spark-backend/go.mod

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build server
        run: go build ./cmd/server
